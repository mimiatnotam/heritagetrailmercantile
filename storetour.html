<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tour the Store – Heritage Trail Mercantile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  background:rgb(241,240,237);
  font-family:'Cormorant SC',Georgia,serif;
  margin:0;
  padding:0;
  animation:fadeIn 0.5s ease-in;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.pw{
  background:#fff;
  max-width:700px;
  margin:0 auto;
}
@media(min-width:720px){
  .pw{
    max-width:700px;
    min-height:100vh;
  }
}

/* NAV */
nav{
  background:#b5bf8b;
  padding:11px 20px;
  text-align:center;
}
nav a{
  font-family:Baskerville,'Baskerville Old Face',Georgia,serif;
  font-size:11px;
  font-weight:500;
  letter-spacing:.14em;
  color:#fff;
  text-decoration:none;
  margin:0 9px;
  text-transform:uppercase;
}
nav a:hover{text-decoration:underline;}

/* LOGO */
.logo{
  display:block;
  width:100%;
  height:auto;
  margin-top:24px;
}

/* SECTION IMAGES */
.sec-img{
  display:block;
  width:100%;
  height:auto;
  margin:0;
  padding:0;
  vertical-align:bottom;
}

.sec-img + .sec-img{
  margin-top:24px;
}

/* SOCIAL ICONS */
.social{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:24px 0;
  background:#fff;
}

/* FOOTER */
.social{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:24px 0;
  background:#fff;
}

footer{
  background:#fff;
  text-align:center;
  padding:14px 20px 20px;
  border-top:1px solid #e0ddd8;
  font-family:Arial,Helvetica,sans-serif;
  font-size:9px;
  letter-spacing:.04em;
  color:#000;
  line-height:1.9;
}
footer a{
  color:#000;
  text-decoration:none;
}
footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="pw">

  <!-- NAV -->
  <nav>
    <a href="/">About HTM</a>
    <a href="/tourthestore">Tour the Store</a>
    <a href="/salesevents">Sales Events</a>
    <a href="/ourstory">Our Story</a>
    <a href="/contact">Contact</a>
  </nav>

  <!-- LOGO -->
  <a href="/">
    <img class="logo" src="section-1-logo.jpg" alt="Heritage Trail Mercantile">
  </a>

  <!-- VIDEO -->
  <div style="margin-top:24px;width:100%;aspect-ratio:16/9;">
    <iframe 
      width="100%" 
      height="100%" 
      src="https://www.youtube.com/embed/JdiZqFSX3lM" 
      title="Heritage Trail Mercantile Store Tour"
      frameborder="0" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>
  </div>

  <!-- SOCIAL ICONS -->
  <div class="social">
    <a href="https://www.instagram.com/heritage.trail/" target="_blank" aria-label="Instagram">
      <img src="icon-instagram.jpg" alt="Instagram" style="width:36px;height:36px;">
    </a>
    <a href="https://www.facebook.com/HeritageTrailMall/" target="_blank" aria-label="Facebook">
      <img src="icon-facebook.jpg" alt="Facebook" style="width:36px;height:36px;">
    </a>
  </div>

  <!-- FOOTER -->
  <footer>
    Heritage Trail Mercantile LLC 2026, All Rights Reserved &nbsp;·&nbsp;
    190-B Northfield Road, Northfield, IL, 60093 &nbsp;·&nbsp;
    847-256-6208 &nbsp;·&nbsp;
    <a href="privacy.html">Privacy Policy and Terms and Services</a> &nbsp;·&nbsp;
    Development by Notam Branding LLC
  </footer>

</div>
</body>
</html>
