<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Trail Mercantile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#d6d3ce;
  font-family:'Cormorant SC',Georgia,serif;
}

.pw{
  background:#fff;
  max-width:700px;
  margin:0 auto;
}
@media(min-width:720px){
  .pw{
    border-left:1px solid #c4c0b8;
    border-right:1px solid #c4c0b8;
    min-height:100vh;
  }
}

/* NAV */
nav{
  background:#b5bf8b;
  padding:11px 20px;
  text-align:center;
}
nav a{
  font-family:'Cormorant SC',serif;
  font-size:11px;
  font-weight:500;
  letter-spacing:.14em;
  color:#fff;
  text-decoration:none;
  margin:0 9px;
  text-transform:uppercase;
}
nav a:hover{text-decoration:underline;}

/* SECTION IMAGES — slight breathing room between sections */
.sec-img{
  display:block;
  width:100%;
  height:auto;
  margin:0;
  padding:0;
  vertical-align:bottom;
}

.sec-img + .sec-img{
  margin-top:24px;
}

/* SOCIAL ICONS */
.social{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:24px 0;
  background:#fff;
}

/* FOOTER */
footer{
  background:#fff;
  text-align:center;
  padding:0 20px 20px;
  border-top:1px solid #e0ddd8;
  padding-top:14px;
  font-family:'Cormorant SC',serif;
  font-size:8px;
  letter-spacing:.07em;
  color:#9a9590;
  line-height:1.9;
}
footer a{
  color:#9a9590;
  text-decoration:none;
}
footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="pw">

  <!-- NAV -->
  <nav>
    <a href="index.html">About HTM</a>
    <a href="tour.html">Tour the Store</a>
    <a href="sales.html">Sales Events</a>
    <a href="history.html">Our History</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- IMAGE 1: Logo -->
  <img class="sec-img" src="section-1-logo.jpg" alt="Heritage Trail Mercantile logo">

  <!-- IMAGE 2: Tagline + Intro -->
  <img class="sec-img" src="section-2-tagline.jpg" alt="Vintage Home and Style Curators">

  <!-- IMAGE 3: Collage 1 -->
  <img class="sec-img" src="section-3-collage1.jpg" alt="Antique and vintage item collage">

  <!-- IMAGE 4: Pull Quote -->
  <img class="sec-img" src="section-4-quote.jpg" alt="Daily North Shore quote">

  <!-- IMAGE 5: Collage 2 -->
  <img class="sec-img" src="section-5-collage2.jpg" alt="Mid-century modern collage">

  <!-- IMAGE 6: Mission -->
  <img class="sec-img" src="section-6-mission.jpg" alt="Our mission is to inspire">

  <!-- IMAGE 7: House of Holly -->
  <img class="sec-img" src="section-7-holly.jpg" alt="House of Holly chic boutique">

  <!-- IMAGE 8: Sales Events -->
  <img class="sec-img" src="section-8-sales.jpg" alt="Sales Events">

  <!-- IMAGE 9: Collage 3 -->
  <img class="sec-img" src="section-9-collage3.jpg" alt="Vintage home and fashion collage">

  <!-- IMAGE 10: CTA -->
  <img class="sec-img" src="section-10-cta.jpg" alt="Follow us on social media">

  <!-- SOCIAL ICONS -->
  <div class="social">
    <a href="https://www.instagram.com/heritage.trail/" target="_blank" aria-label="Instagram">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ig" cx="30%" cy="107%" r="150%">
            <stop offset="0%" stop-color="#fdf497"/>
            <stop offset="5%" stop-color="#fdf497"/>
            <stop offset="45%" stop-color="#fd5949"/>
            <stop offset="60%" stop-color="#d6249f"/>
            <stop offset="90%" stop-color="#285AEB"/>
          </radialGradient>
        </defs>
        <rect width="48" height="48" rx="12" fill="url(#ig)"/>
        <rect x="13" y="13" width="22" height="22" rx="6" stroke="#fff" stroke-width="2.2" fill="none"/>
        <circle cx="24" cy="24" r="5.5" stroke="#fff" stroke-width="2.2" fill="none"/>
        <circle cx="31" cy="17" r="1.4" fill="#fff"/>
      </svg>
    </a>
    <a href="https://www.facebook.com/HeritageTrailMall/" target="_blank" aria-label="Facebook">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="12" fill="#1877F2"/>
        <path d="M28 14h-3a5 5 0 0 0-5 5v3h-3v5h3v10h5V27h3l1-5h-4v-3a1 1 0 0 1 1-1h3z" fill="#fff"/>
      </svg>
    </a>
  </div>

  <!-- FOOTER -->
  <footer>
    Heritage Trail Mercantile LLC 2026, All Rights Reserved &nbsp;·&nbsp;
    190-B Northfield Road, Northfield, IL, 60093 &nbsp;·&nbsp;
    847-256-6208 &nbsp;·&nbsp;
    <a href="privacy.html">Privacy Policy and Terms and Services</a> &nbsp;·&nbsp;
    Development by Notam Branding LLC
  </footer>

</div>
</body>
</html>
