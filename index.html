<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Trail Mercantile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  background:rgb(241,240,237);
  font-family:'Cormorant SC',Georgia,serif;
  margin:0;
  padding:0;
  animation:fadeIn 0.5s ease-in;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.pw{
  background:#fff;
  max-width:700px;
  margin:0 auto;
}
@media(min-width:720px){
  .pw{
    max-width:700px;
    min-height:100vh;
  }
}

/* NAV */
nav{
  background:#b5bf8b;
  padding:11px 20px;
  text-align:center;
}
nav a{
  font-family:Baskerville,'Baskerville Old Face',Georgia,serif;
  font-size:11px;
  font-weight:500;
  letter-spacing:.14em;
  color:#fff;
  text-decoration:none;
  margin:0 9px;
  text-transform:uppercase;
}
nav a:hover{text-decoration:underline;}

/* SECTION IMAGES — slight breathing room between sections */
.sec-img{
  display:block;
  width:100%;
  height:auto;
  margin:0;
  padding:0;
  vertical-align:bottom;
}

.sec-img:first-of-type{
  margin-top:24px;
}

.sec-img + .sec-img{
  margin-top:24px;
}

/* House of Holly and Sales Events sit closer together */
#section-8{
  margin-top:8px;
}

/* Restore standard spacing after Sales Events */
#section-9{
  margin-top:24px;
}

/* SOCIAL ICONS */
.social{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:24px 0;
  background:#fff;
}

/* FOOTER */
footer{
  background:#fff;
  text-align:center;
  padding:14px 20px 20px;
  border-top:1px solid #e0ddd8;
  font-family:Arial,Helvetica,sans-serif;
  font-size:9px;
  letter-spacing:.04em;
  color:#000;
  line-height:1.9;
}
footer a{
  color:#000;
  text-decoration:none;
}
footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="pw">

  <!-- NAV -->
  <nav>
    <a href="/">About HTM</a>
    <a href="/tourthestore">Tour the Store</a>
    <a href="/salesevents">Sales Events</a>
    <a href="/ourstory">Our Story</a>
    <a href="/contact">Contact</a>
  </nav>

  <!-- IMAGE 1: Logo -->
  <a href="index.html">
    <img class="sec-img" src="section-1-logo.jpg" alt="Heritage Trail Mercantile logo">
  </a>

  <!-- IMAGE 2: Tagline + Intro -->
  <img class="sec-img" src="section-2-tagline.jpg" alt="Vintage Home and Style Curators">

  <!-- IMAGE 3: Collage 1 -->
  <img class="sec-img" src="section-3-collage1.jpg" alt="Antique and vintage item collage">

  <!-- IMAGE 4: Pull Quote -->
  <img class="sec-img" src="section-4-quote.jpg" alt="Daily North Shore quote">

  <!-- IMAGE 5: Collage 2 -->
  <img class="sec-img" src="section-5-collage2.jpg" alt="Mid-century modern collage">

  <!-- IMAGE 6: Mission -->
  <img class="sec-img" src="section-6-mission.jpg" alt="Our mission is to inspire">

  <!-- IMAGE 7: House of Holly -->
  <a href="https://www.instagram.com/house_of_holly_vintage/" target="_blank">
    <img class="sec-img" src="section-7-holly.jpg" alt="House of Holly chic boutique">
  </a>

  <!-- IMAGE 8: Sales Events -->
  <a href="sales.html">
    <img class="sec-img" id="section-8" src="section-8-sales.jpg" alt="Sales Events">
  </a>

  <!-- IMAGE 9: Collage 3 -->
  <img class="sec-img" id="section-9" src="section-9-collage3.jpg" alt="Vintage home and fashion collage">

  <!-- IMAGE 10: CTA -->
  <img class="sec-img" src="section-10-cta.jpg" alt="Follow us on social media">

  <!-- MAILCHIMP SIGNUP FORM -->
  <div style="padding:32px 40px;background:#fff;text-align:center;">
    <link href="//cdn-images.mailchimp.com/embedcode/classic-10_7.css" rel="stylesheet" type="text/css">
    <style>

      #mc_embed_signup input.email{font-family:'Libre Baskerville',Georgia,serif;font-size:14px;color:#4a4540;background:rgb(241,240,237);border:none;padding:10px 12px;width:100%;border-radius:0;}
      #mc_embed_signup .button{background:#b5bf8b;font-family:'Libre Baskerville',Georgia,serif;font-size:11px;letter-spacing:.22em;text-transform:uppercase;border-radius:0;width:100%;height:42px;}
      #mc_embed_signup .button:hover{background:#a3ae78;}

            <div class="response" id="mce-success-response" style="display:none"></div>
          </div>
          <div style="position:absolute;left:-5000px;" aria-hidden="true">
            <input type="text" name="b_94c6fdbf43bb23737265c0188_a40381ac8d" tabindex="-1" value="">
          </div>
          <div class="clear">
            <input type="submit" value="Subscribe" name="subscribe" id="mc-embedded-subscribe" class="button">
          </div>
        </div>
      </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script type='text/javascript' src='//s3.amazonaws.com/downloads.mailchimp.com/js/mc-validate.js'></script>
    <script type='text/javascript'>(function($) {window.fnames = new Array(); window.ftypes = new Array();fnames[0]='EMAIL';ftypes[0]='email';}(jQuery));var $mcj = jQuery.noConflict(true);</script>
  </div>

  <!-- SOCIAL ICONS -->
  <div class="social">
    <a href="https://www.instagram.com/heritage.trail/" target="_blank" aria-label="Instagram">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ig" cx="30%" cy="107%" r="150%">
            <stop offset="0%" stop-color="#fdf497"/>
            <stop offset="5%" stop-color="#fdf497"/>

        <circle cx="24" cy="24" r="5.5" stroke="#fff" stroke-width="2.2" fill="none"/>
        <circle cx="31" cy="17" r="1.4" fill="#fff"/>
      </svg>
    </a>
    <a href="https://www.facebook.com/HeritageTrailMercantile" target="_blank" aria-label="Facebook">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="12" fill="#1877F2"/>
        <path d="M28 14h-3a5 5 0 0 0-5 5v3h-3v5h3v10h5V27h3l1-5h-4v-3a1 1 0 0 1 1-1h3z" fill="#fff"/>
      </svg>
    </a>
  </div>

  <!-- FOOTER -->
  <footer>
    Heritage Trail Mercantile LLC 2026, All Rights Reserved &nbsp;·&nbsp;
    190-B Northfield Road, Northfield, IL, 60093 &nbsp;·&nbsp;
    847-256-6208 &nbsp;·&nbsp;

    Development by Notam Branding LLC
  </footer>

</body>
</html>
