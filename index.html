<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage Trail Mercantile</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  background:rgb(241,240,237);
  font-family:'Cormorant SC',Georgia,serif;
  margin:0;
  padding:0;
  animation:fadeIn 0.5s ease-in;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.pw{
  background:#fff;
  max-width:700px;
  margin:0 auto;
}
@media(min-width:720px){
  .pw{
    max-width:700px;
    min-height:100vh;
  }
}

/* NAV */
nav{
  background:#b5bf8b;
  padding:11px 20px;
  text-align:center;
}
nav a{
  font-family:Baskerville,'Baskerville Old Face',Georgia,serif;
  font-size:11px;
  font-weight:500;
  letter-spacing:.14em;
  color:#fff;
  text-decoration:none;
  margin:0 9px;
  text-transform:uppercase;
}
nav a:hover{text-decoration:underline;}

/* SECTION IMAGES — slight breathing room between sections */
.sec-img{
  display:block;
  width:100%;
  height:auto;
  margin:0;
  padding:0;
  vertical-align:bottom;
}

.sec-img:first-of-type{
  margin-top:24px;
}

.sec-img + .sec-img{
  margin-top:24px;
}

/* House of Holly and Sales Events sit closer together */
#section-8{
  margin-top:8px;
}

/* Restore standard spacing after Sales Events */
#section-9{
  margin-top:24px;
}

/* SOCIAL ICONS */
.social{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:24px 0;
  background:#fff;
}

/* FOOTER */
footer{
  background:#fff;
  text-align:center;
  padding:14px 20px 20px;
  border-top:1px solid #e0ddd8;
  font-family:Arial,Helvetica,sans-serif;
  font-size:9px;
  letter-spacing:.04em;
  color:#000;
  line-height:1.9;
}
footer a{
  color:#000;
  text-decoration:none;
}
footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="pw">

  <!-- NAV -->
  <nav>
    <a href="index.html">About HTM</a>
    <a href="storetour.html">Tour the Store</a>
    <a href="sales.html">Sales Events</a>
    <a href="history.html">Our Story</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- IMAGE 1: Logo -->
  <a href="index.html">
    <img class="sec-img" src="section-1-logo.jpg" alt="Heritage Trail Mercantile logo">
  </a>

  <!-- IMAGE 2: Tagline + Intro -->
  <img class="sec-img" src="section-2-tagline.jpg" alt="Vintage Home and Style Curators">

  <!-- IMAGE 3: Collage 1 -->
  <img class="sec-img" src="section-3-collage1.jpg" alt="Antique and vintage item collage">

  <!-- IMAGE 4: Pull Quote -->
  <img class="sec-img" src="section-4-quote.jpg" alt="Daily North Shore quote">

  <!-- IMAGE 5: Collage 2 -->
  <img class="sec-img" src="section-5-collage2.jpg" alt="Mid-century modern collage">

  <!-- IMAGE 6: Mission -->
  <img class="sec-img" src="section-6-mission.jpg" alt="Our mission is to inspire">

  <!-- IMAGE 7: House of Holly -->
  <a href="https://www.instagram.com/house_of_holly_vintage/" target="_blank">
    <img class="sec-img" src="section-7-holly.jpg" alt="House of Holly chic boutique">
  </a>

  <!-- IMAGE 8: Sales Events -->
  <a href="sales.html">
    <img class="sec-img" id="section-8" src="section-8-sales.jpg" alt="Sales Events">
  </a>

  <!-- IMAGE 9: Collage 3 -->
  <img class="sec-img" id="section-9" src="section-9-collage3.jpg" alt="Vintage home and fashion collage">

  <!-- IMAGE 10: CTA -->
  <img class="sec-img" src="section-10-cta.jpg" alt="Follow us on social media">

  <!-- SOCIAL ICONS -->
 <div class="social">
  <a href="https://www.instagram.com/heritage.trail/" target="_blank" aria-label="Instagram">
    <img src="icon-instagram.jpg" alt="Instagram" style="width:48px;height:48px;">
  </a>
  <a href="https://www.facebook.com/HeritageTrailMall/" target="_blank" aria-label="Facebook">
    <img src="icon-facebook.jpg" alt="Facebook" style="width:48px;height:48px;">
  </a>
</div>

  <!-- FOOTER -->
  <footer>
    Heritage Trail Mercantile LLC 2026, All Rights Reserved &nbsp;·&nbsp;
    190-B Northfield Road, Northfield, IL, 60093 &nbsp;·&nbsp;
    847-256-6208 &nbsp;·&nbsp;
    <a href="privacy.html">Privacy Policy and Terms and Services</a> &nbsp;·&nbsp;
    Development by Notam Branding LLC
  </footer>

</div>
</body>
</html>
