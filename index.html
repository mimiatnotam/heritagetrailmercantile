<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
  background:rgb(241,240,237);
  font-family:'Cormorant SC',Georgia,serif;
  margin:0;
  padding:0;
  animation:fadeIn 0.5s ease-in;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

.pw{
  background:#fff;
  max-width:700px;
  margin:0 auto;
}
@media(min-width:720px){
  .pw{
    max-width:700px;
    min-height:100vh;
  }
}

/* NAV */
nav{
  background:#b5bf8b;
  padding:11px 20px;
  text-align:center;
}
nav a{
  font-family:Baskerville,'Baskerville Old Face',Georgia,serif;
  font-size:11px;
  font-weight:500;
  letter-spacing:.14em;
  color:#fff;
  text-decoration:none;
  margin:0 9px;
  text-transform:uppercase;
}
nav a:hover{text-decoration:underline;}

/* SECTION IMAGES — slight breathing room between sections */
.sec-img{
  display:block;
  width:100%;
  height:auto;
  margin:0;
  padding:0;
  vertical-align:bottom;
}

.sec-img:first-of-type{
  margin-top:24px;
}

.sec-img + .sec-img{
  margin-top:24px;
}

/* House of Holly and Sales Events sit closer together */
#section-8{
  margin-top:8px;
}

/* Restore standard spacing after Sales Events */
#section-9{
  margin-top:24px;
}

/* SOCIAL ICONS */
.social{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  padding:24px 0;
  background:#fff;
}

/* FOOTER */
footer{
  background:#fff;
  text-align:center;
  padding:14px 20px 20px;
  border-top:1px solid #e0ddd8;
  font-family:Arial,Helvetica,sans-serif;
  font-size:9px;
  letter-spacing:.04em;
  color:#000;
  line-height:1.9;
}
footer a{
  color:#000;
  text-decoration:none;
}
footer a:hover{text-decoration:underline;}
</style>
</head>
